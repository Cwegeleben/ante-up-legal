<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Returning to Ante Up…</title>
<meta http-equiv="refresh" content="0;url=ante-up://auth/callback">
<script>
  // Forward OAuth query string (code, state, error, etc.) to the app's deep link.
  (function () {
    var target = 'ante-up://auth/callback' + window.location.search;
    window.location.replace(target);
  })();
</script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; text-align: center; padding: 2em; color: #333; }
  a { color: #0a7; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
<p>Returning to Ante Up…</p>
<p>If you're not redirected automatically, <a id="link" href="ante-up://auth/callback">tap here</a>.</p>
<script>
  var link = document.getElementById('link');
  if (link) link.href = 'ante-up://auth/callback' + window.location.search;
</script>
</body>
</html>
